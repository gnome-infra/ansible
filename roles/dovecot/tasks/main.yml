---
- name: Install the packages we need
  yum:
    name: "{{ dovecot_packages }}"
    state: present
  vars:
    dovecot_packages:
      - dovecot
      - dovecot-pigeonhole

- name: Generate dh2048.pem
  command:
    cmd: /usr/bin/openssl dhparam -out /etc/dovecot/dh2048.pem 2048
    creates: /etc/dovecot/dh2048.pem
  notify: Restart Dovecot

- name: Set permissions on the picked Dovecot maildir
  file:
    dest: "{{ dovecot_maildir }}"
    state: directory
    mode: '0755'
    owner: "{{ dovecot_maildir_user }}"
    group: "{{ dovecot_maildir_group }}"
    setype: mail_home_rw_t

- name: Create shared mailbox parent directories
  file:
    path: "{{ dovecot_maildir }}/{{ item.name }}"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ dovecot_mail_privileged_group }}"
    mode: '2770'
    setype: mail_home_rw_t
  loop: "{{ dovecot_shared_mailboxes | default([]) }}"

- name: Create shared mailbox Maildir directories
  file:
    path: "{{ dovecot_maildir }}/{{ item.0.name }}/{{ item.1 }}"
    state: directory
    owner: "{{ item.0.name }}"
    group: "{{ dovecot_mail_privileged_group }}"
    mode: '2770'
    setype: mail_home_rw_t
  loop: "{{ (dovecot_shared_mailboxes | default([])) | product(['Maildir', 'Maildir/cur', 'Maildir/new', 'Maildir/tmp']) | list }}"

- name: Create shared mailbox Sent directories
  file:
    path: "{{ dovecot_maildir }}/{{ item.0.name }}/{{ item.1 }}"
    state: directory
    owner: "{{ item.0.name }}"
    group: "{{ dovecot_mail_privileged_group }}"
    mode: '2770'
    setype: mail_home_rw_t
  loop: "{{ (dovecot_shared_mailboxes | default([])) | product(['Maildir/.Sent', 'Maildir/.Sent/cur', 'Maildir/.Sent/new', 'Maildir/.Sent/tmp']) | list }}"

- name: Create shared mailbox dict directory
  file:
    path: /srv/dovecot/dict
    state: directory
    owner: dovecot
    group: "{{ dovecot_mail_privileged_group }}"
    mode: '0770'
    setype: mail_home_rw_t

- name: Land shared mailbox ACL files
  template:
    src: dovecot-acl.j2
    dest: "{{ dovecot_maildir }}/{{ item.name }}/Maildir/dovecot-acl"
    owner: "{{ item.name }}"
    group: "{{ dovecot_mail_privileged_group }}"
    mode: '0660'
    setype: mail_home_rw_t
  loop: "{{ dovecot_shared_mailboxes | default([]) }}"

- name: Subscribe users to shared mailboxes
  command: >
    doveadm mailbox subscribe -u {{ item.1 }}
    shared/{{ item.0.name }}/INBOX
  loop: "{{ dovecot_shared_mailboxes | default([]) | subelements('acl_users') }}"
  changed_when: false

- name: Land Dovecot configuration
  template:
    src: dovecot.conf.j2
    dest: /etc/dovecot/dovecot.conf
    owner: root
    group: root
    mode: 0644
  notify: Restart Dovecot

- name: Land Dovecot additional configuration
  template:
    src: "{{ item }}.j2"
    dest: "/etc/dovecot/conf.d/{{ item }}"
    owner: root
    group: root
    mode: 0644
  loop:
    - auth-ldap.conf.ext
    - dovecot-ldap.conf.ext
    - 20-lmtp.conf
    - 20-managesieve.conf
    - 90-sieve.conf
    - 10-auth.conf
    - 10-mail.conf
    - 10-master.conf
    - 10-ssl.conf
  notify: Restart Dovecot

- name: Create sieve-before directory
  file:
    path: /etc/dovecot/sieve-before
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Land shared-sent sieve script
  copy:
    src: shared-sent.sieve
    dest: /etc/dovecot/sieve-before/shared-sent.sieve
    owner: root
    group: root
    mode: '0644'
  notify: Restart Dovecot

- name: Compile shared-sent sieve script
  command: sievec /etc/dovecot/sieve-before/shared-sent.sieve
  changed_when: false

- name: Start and enable Dovecot
  service:
    name: dovecot
    state: started
    enabled: true
