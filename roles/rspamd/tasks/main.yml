---
- name: Land rspamd default Yum repository
  yum_repository:
    name: rspamd
    description: rspamd Yum repository
    baseurl: https://rspamd.com/rpm-stable/centos-9/x86_64
    gpgcheck: yes
    gpgkey: https://rspamd.com/rpm/gpg.key

- name: Install the default set of packages rspamd needs
  yum:
    name: "{{ rspamd_packages }}"
    state: present
  vars:
    rspamd_packages:
      - rspamd
      - redis

- name: Land rspamd default conf file
  template:
    src: rspamd.conf.local.j2
    dest: /etc/rspamd/rspamd.conf.local
    owner: root
    group: root
    mode: 0644
  notify: Restart rspamd

- name: Land additional rspamd config files
  copy:
    src: local.d/
    dest: /etc/rspamd/local.d
    owner: root
    group: root
    mode: 0644
  notify: Restart rspamd

- name: Land custom Lua code
  template:
    src: rspamd.local.lua.j2
    dest: /etc/rspamd/rspamd.local.lua
    owner: root
    group: root
    mode: 0644
  notify: Restart rspamd

- name: Land additional rspamd templated config files
  template:
    src: local.d/{{ item }}.j2
    dest: /etc/rspamd/local.d/{{ item }}
    owner: root
    group: root
    mode: 0644
  loop:
    - rbl.conf
    - surbl.conf
    - options.inc
    - gpt.conf
  notify: Restart rspamd

- name: Create rspamd learn state directory
  file:
    path: /var/lib/rspamd-learn
    state: directory
    owner: root
    group: root
    mode: 0755
  when:
    - dovecot_maildir is defined
    - dovecot_maildir == '/srv/dovecot'

- name: Land rspamd Junk learn files
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}/{{ item.src }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { src: rspamd-learn-junk.sh, dest: /usr/local/sbin, mode: '0755' }
    - { src: rspamd-learn-junk.service, dest: /etc/systemd/system, mode: '0644' }
    - { src: rspamd-learn-junk.timer, dest: /etc/systemd/system, mode: '0644' }
  when:
    - dovecot_maildir is defined
    - dovecot_maildir == '/srv/dovecot'

- name: Start and enable rspamd
  service:
    name: rspamd
    state: started
    enabled: true

- name: Start and enable redis
  service:
    name: redis
    state: started
    enabled: true

- name: Start and enable rspamd Junk learn timer
  systemd:
    name: rspamd-learn-junk.timer
    daemon_reload: true
    state: started
    enabled: true
  when:
    - dovecot_maildir is defined
    - dovecot_maildir == '/srv/dovecot'
