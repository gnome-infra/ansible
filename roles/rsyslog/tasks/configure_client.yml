- name: Install rsyslog-gnutls for TLS support
  package:
    name: rsyslog-gnutls
    state: present
  when: rsyslog_client_tls | default(false)

- name: Configure remote logging
  template:
    src: remotelog.conf.j2
    dest: /etc/rsyslog.d/remotelog.conf
  notify: restart rsyslog

- name: Install the audispd-plugins package
  package:
    name: audispd-plugins
    state: present
  when: ansible_os_family == "RedHat"

- name: Set nis_enabled to on
  ansible.posix.seboolean:
    name: nis_enabled
    state: true
    persistent: true
  when: ansible_selinux.status | default('disabled') == 'enabled'

- name: Make sure auditd logs are forwarded
  lineinfile:
    path: /etc/audit/plugins.d/syslog.conf
    regexp: '^active ='
    line: 'active = yes'
  when: ansible_os_family == "RedHat"
  notify: restart auditd
